<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memo - My Math Notes</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        /* メモ一覧専用の追加スタイル */
        .featured-post {
            border: 2px solid var(--main-blue);
            background: var(--light-gray);
            position: relative;
        }

        .featured-badge {
            position: absolute;
            top: -12px; /* カードの外に少しはみ出させる */
            left: 15px;
            background: var(--accent-red);
            color: white;
            padding: 2px 12px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 4px;
            z-index: 10; /* カード(z-index未指定なら0)より上に表示 */
        }

        .post-link {
            text-decoration: none;
            color: inherit;
            display: block;
            transition: 0.2s;
        }

        .post-link:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        .category-tag {
            display: inline-block;
            background: var(--main-blue);
            color: white;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 3px;
            margin-bottom: 8px;
        }

        .post-meta {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 10px;
        }

        .post-summary {
            font-size: 0.95rem;
            color: #444;
        }

        /* カテゴリの見出し */
        .category-section-title {
            margin-top: 50px;
            font-size: 1.4rem;
            border-bottom: 2px solid var(--main-black);
            display: inline-block;
        }
    </style>
</head>
